<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 220px; font-family: 'Inter', sans-serif; padding: 16px; color: #1e293b; }
    h3 { margin: 0 0 12px; font-size: 14px; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
    .field { margin-bottom: 16px; }
    label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 6px; color: #475569; }
    select { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #e2e8f0; font-size: 13px; outline: none; }
    button { 
      width: 100%; padding: 10px; border-radius: 8px; border: none; 
      background: #6366f1; color: white; font-weight: 600; cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #4f46e5; }
    .footer { font-size: 11px; color: #94a3b8; text-align: center; margin-top: 12px; }
  </style>
</head>
<body>
  <h3>Settings</h3>
  <div class="field">
    <label>Target Language</label>
    <select id="targetLang">
      <option value="en">English</option>
      <option value="de">German</option>
      <option value="fr">French</option>
      <option value="es">Spanish</option>
      <option value="zh">Chinese</option>
    </select>
  </div>
  <button id="exportBtn">Export Bookmarks (CSV)</button>
  <div class="footer">Bookmarks are saved locally</div>
  <script src="toolbar.js"></script>
</body>
</html>
